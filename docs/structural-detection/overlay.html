<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Structural walls overlay</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    #toolbar { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
    #stage { position: relative; border: 1px solid #ccc; overflow: auto; }
    #stage img, #stage object { display: block; width: 100%; }
    #svgLayer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Plan image: <input type="file" id="fileInput" accept="image/*" /></label>
    <label>Overlay opacity:
      <input type="range" id="opacity" min="0" max="1" step="0.05" value="1" />
    </label>
  </div>
  <div id="stage">
    <img id="planImg" alt="Load the original plan image with the file picker above" />
    <object id="svgLayer" type="image/svg+xml" data="walls.svg"></object>
  </div>
  <script>
    const fileInput = document.getElementById("fileInput");
    const planImg = document.getElementById("planImg");
    const svgLayer = document.getElementById("svgLayer");
    const opacity = document.getElementById("opacity");

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) planImg.src = URL.createObjectURL(file);
    });
    opacity.addEventListener("input", () => {
      svgLayer.style.opacity = opacity.value;
    });
  </script>
</body>
</html>
